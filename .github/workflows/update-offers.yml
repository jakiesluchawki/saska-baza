name: Update offers

on:
  schedule:
    - cron: "17 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-offers
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Search and refresh offers
        run: node scripts/update-offers.mjs

      - name: Check JavaScript syntax
        run: node --check app.js

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js
          git commit -m "Refresh Saska listings"
          git push
